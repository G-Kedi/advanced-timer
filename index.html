<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Timer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="img/easypage.png" alt="le logo de easy page">
      </div>
      <div class="menu-bars">
        <span></span>
        <span></span>
      </div>
    </header>
    <section class="timer-container">
      <h1>Timer</h1>
      <div id="timer-controls" class="timer-controls">
        <div class="timer-inputs">
          <input type="number" id="hours" placeholder="0 Heures" min="0" />
          <input type="number" id="minutes" placeholder="0 Minutes" min="0" max="59" />
          <input type="number" id="seconds" placeholder="0 Secondes" min="0" max="59" />
        </div>
        
        <div>
          <button id="start-btn">Start</button>
          <button id="pause-btn">Pause</button>
          <button id="resume-btn">Resume</button>
          <button id="reset-btn">Reset</button>
        </div>
      </div>
      <div id="timer-display" class="timer-display">00:00:00</div>
    </section>
    <footer>
      <p>&copy; 2026 <a href="https://easypagemonde.com">easypagemonde.com</a>. All rights reserved.</p>
    </footer>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
