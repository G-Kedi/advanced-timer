<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Timer</title>
    <link rel="stylesheet" href="css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="assets/img/easypage.png" alt="le logo de easy page" />
      </div>
      <div class="menu-bars">
        <span></span>
        <span></span>
      </div>
    </header>
    <section class="timer-container">
      <h1>Easy Timer</h1>
      <div id="timer-display" class="timer-display">00:00:00</div>
      <div id="timer-controls" class="timer-controls">
        <div class="timer-inputs">
          <input
            type="number"
            id="hours"
            placeholder="0"
            min="0"
            class="no-spinner"
          />h
          <input
            type="number"
            id="minutes"
            placeholder="0"
            min="0"
            max="59"
            class="no-spinner"
          />m
          <input
            type="number"
            id="seconds"
            placeholder="0"
            min="0"
            max="59"
            class="no-spinner"
          />s
        </div>
        <div class="btn-container">
          <button id="btn-start-reset">
            <img
              id="icon-start-reset"
              src="assets/icons/play.png"
              alt="Démarrer"
            />
          </button>
          <button id="btn-pause-resume">
            <img
              id="icon-pause-resume"
              src="assets/icons/pause.png"
              alt="Pause"
            />
          </button>
        </div>
      </div>
    </section>
    <footer>
      <p>
        &copy; 2026 <a href="https://easypagemonde.com">easypagemonde.com</a>.
        All rights reserved.
      </p>
    </footer>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
